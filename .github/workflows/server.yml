name: Server CI - PR

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - ".github/workflows/server.yml"

jobs:
  test:
    name: Test server 🧪
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: redirect-lab-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        id: install-dependencies
        run: npm ci

      - name: Run tests
        id: run-tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/redirect-lab-test

  build:
    name: Build server 🧱
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        id: install-dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build
